server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:4200
              - http://localhost:3000
              - https://localhost:4200
              - https://localhost:3000
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - AddRequestHeader=X-Gateway-Request, true
        - id: profile-service
          uri: lb://profile-service
          predicates:
            - Path=/profiles/**
        - id: job-service
          uri: lb://job-service
          predicates:
            - Path=/jobs/**
        - id: application-service
          uri: lb://application-service
          predicates:
            - Path=/applications/**
        - id: interview-service
          uri: lb://interview-service
          predicates:
            - Path=/interviews/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notifications/**
        - id: subscription-service
          uri: lb://subscription-service
          predicates:
            - Path=/subscriptions/**
            - Path=/invoices/**
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/analytics/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

app:
  jwt:
    secret: MyVeryStrongSecretKeyForJwt123456789012345
    access-token-expiry-ms: 3600000
    refresh-token-expiry-ms: 604800000

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.web.reactive: INFO
    com.hireconnect.gateway: DEBUG
    org.springframework.security: DEBUG
    reactor.netty: INFO
